version: '3.8'

services:
  db:
    image: postgres:16
    container_name: ieee_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ieee_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ieee_password}
      POSTGRES_DB: ${POSTGRES_DB:-ieee_opportunities}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ieee_user -d ieee_opportunities"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ieee_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ieee_user}:${POSTGRES_PASSWORD:-ieee_password}@db:5432/${POSTGRES_DB:-ieee_opportunities}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
